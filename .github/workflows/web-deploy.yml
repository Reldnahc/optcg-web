name: Deploy Website

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/web-deploy.yml"
      - ".env.production"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "vite.config.ts"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  WEBSITE_BUCKET: poneglyph-one-website-894103237356
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Download previous deployed site snapshot
        run: |
          mkdir -p .previous-site
          aws s3 sync "s3://${WEBSITE_BUCKET}" .previous-site \
            --exclude "*" \
            --include "*.html" \
            --include "_meta/*" || true

      - name: Build site
        env:
          PREVIOUS_PRERENDER_MANIFEST_FILE: .previous-site/_meta/prerender-manifest.json
          PREVIOUS_PRERENDER_DIST_DIR: .previous-site
        run: npm run build

      - name: Read CloudFront distribution id
        id: infra
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, 'poneglyph.one')].Id | [0]" \
            --output text)
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      - name: Sync immutable assets to S3
        run: aws s3 sync dist/assets "s3://${WEBSITE_BUCKET}/assets" --cache-control "public,max-age=31536000,immutable"

      - name: Sync non-HTML root files to S3
        run: |
          aws s3 sync dist/ "s3://${WEBSITE_BUCKET}" --delete \
            --exclude "assets/*" \
            --exclude "*.html"

      - name: Sync HTML last
        run: |
          aws s3 sync dist/ "s3://${WEBSITE_BUCKET}" --delete \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.infra.outputs.distribution_id }}" --paths "/*"
